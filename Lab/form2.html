<!DOCTYPE html>
<html>
    <head>
        <title>Registration</title>
        <link rel="stylesheet" href="form2.css">
    </head>
    <body>
        <form method="post">
            <h1>Registration</h1>
            <p>please complete all fields below</p>
            <hr>
            <div class="Field">
                <label for="fullname">Full Name</label> <br>
                 <input type="text" placeholder="Ananta Saha" id="fullname" name="fullname" required>
            </div>
            <div class ="Field">
                <label for="postalcode">Postal Code</label> <br>
                <input type="number" placeholder="10001" id="postalcode" name="postalcode" required>
            </div>
            <div class="Field">
                <label for="dob" >Date of Birth</label> <br>
                <input type="date" placeholder="25/06/2026" id="dob" name="dob" required> 
            </div>
            <div class="Field">
                <label for="email" >Email Address</label> <br>
                <input type="email" placeholder="anoysaha0606@gmail.com" id="email" name="email" required> 
            </div>
            <div class="Field">
                <label for="password" >Password</label> <br>
                <input type="text" placeholder="****" pattern="[0-9]{4,}" id="password" name="password" required> 
            </div>
            <div class="Field">
                <label for="country">Country</label> <br>
                <select id="country" name="country" required>
                    <option value="" selected disabled>Select a Country</option>
                    <option value="Bangladesh">Bangladesh</option>
                    <option value="India">India</option>
                    <option value="Pakistan">Pakistan</option>
                    <option value="Nepal">Nepal</option>
                    <option value="Bhutan">Bhutan</option>
                    <option value="Sri Lanka">Sri Lanka</option>
                    <option value="United States">United States</option>
                    <option value="United Kingdom">United Kingdom</option>
                    <option value="Canada">Canada</option>
                    <option value="Australia">Australia</option>
                </select> 
            </div>
            <div class="buttons">
                <button type="submit" class="btn-primary">Submit</button>
                <button type="reset" class="btn-secondary">Reset</button>
            </div>
        </form>
    </body>
</html>
